<!DOCTYPE html>
<html lang="en" data-env="development">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page_title">Delta Green Agent Character Creator</title>
    <meta name="description" content="Create detailed agent character sheets for your Delta Green RPG sessions with this easy-to-use online character creator. Supports custom professions, skills, and more. No Log-in, no ads, free of costs.">
    <meta name="google-site-verification" content="bz_uz4BtBwAXCsKC8RHZXKlqEY0KaTULTd4DrRX0i_w" />
    <script src="https://cdn.counter.dev/script.js" data-id="ebd38259-4f23-48a0-b169-bfa1c5f86192" data-utcoffset="2"></script>
    
    <!-- Set theme immediately to prevent flash -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const initialTheme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', initialTheme);
        })();
    </script>
    
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- LZ-String for URL compression -->
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
</head>
<body>
    <div id="app-container">
        <header role="banner">
            <h1 data-i18n="app_header">Delta Green Agent Dossier</h1>
            <div id="header-controls" role="toolbar" aria-label="Header controls">
                <div id="news-switcher">
                    <button id="news-toggle" type="button" aria-label="News">
                        <span class="news-icon-wrap">
                            <svg class="news-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/>
                                <path d="M18 14h-8"/>
                                <path d="M15 18h-5"/>
                                <path d="M10 6h8v4h-8V6Z"/>
                            </svg>
                            <span id="news-unread-badge" class="news-unread-badge" hidden aria-hidden="true"></span>
                        </span>
                    </button>
                </div>
                <div id="theme-switcher">
                    <button id="theme-toggle" title="Toggle theme" aria-label="Toggle theme" aria-pressed="false">
                        <span id="theme-icon" aria-hidden="true">🌙</span>
                    </button>
                </div>
                <div id="language-switcher">
                    <select id="language-select" aria-label="Language selection"></select>
                </div>
            </div>
        </header>

        <main id="main-content" role="main" aria-label="Character creation form">
            <div id="progress-bar-container" aria-label="Progress indicator"></div>
            <div id="step-content-container" role="region" aria-live="polite" aria-atomic="true" aria-label="Current step content">
                <!-- Content dynamically inserted here -->
            </div>
        </main>

        <footer role="contentinfo">
            <div class="footer-feedback">
                <p>
                    <span data-i18n="footer_feedback_text">Have feedback or found a bug? Let me know on</span>
                    <a href="https://www.reddit.com/r/DeltaGreenRPG/comments/1l1wi5p/i_made_a_delta_green_character_creator_and_would/" target="_blank" rel="noopener noreferrer" class="footer-link" data-i18n="footer_feedback_link">Reddit</a>
                </p>
            </div>
            <p data-i18n="footer_text">© DG Character Creator - Based on Delta Green</p>
        </footer>
    </div>
    
    <nav id="navigation-container" role="navigation" aria-label="Step navigation">
        <button id="btn-back" data-i18n="btn_back_text" class="nav-button" disabled>Back</button>
        <button id="btn-next" data-i18n="btn_next_text" class="nav-button">Next</button>
    </nav>

    <script type="module" src="js/bootstrap.js"></script>
</body>
</html>
