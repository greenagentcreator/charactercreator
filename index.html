    <script>
        window.__APP_BUILD__ = '27a0927';
        (function () {
            var FALLBACK_BUILD = '27a0927';
            var STORAGE_KEY = 'dg_app_build';
            var versionJsonUrl = 'version.json?_=' + Date.now();

            function readStoredBuild() {
                try {
                    return localStorage.getItem(STORAGE_KEY);
                } catch (e) {
                    return null;
                }
            }

            function writeStoredBuild(buildId) {
                try {
                    localStorage.setItem(STORAGE_KEY, buildId);
                } catch (e) { /* private browsing */ }
            }

            function urlBuildParam() {
                return new URLSearchParams(location.search).get('v');
            }

            function redirectToBuild(buildId) {
                writeStoredBuild(buildId);
                var next = location.pathname
                    + '?v=' + encodeURIComponent(buildId)
                    + location.hash;
                location.replace(next);
            }

            function assetUrl(path, buildId) {
                return buildId === 'dev' ? path : path + '?v=' + encodeURIComponent(buildId);
            }

            function updateVersionedAssets(buildId) {
                var importMapScript = document.querySelector('script[type="importmap"]');
                if (importMapScript) {
                    importMapScript.textContent = JSON.stringify({
                        imports: {
                            app: assetUrl('./js/app.js', buildId),
                            main: assetUrl('./js/main.js', buildId)
                        }
                    });
                }
                var cssLink = document.querySelector('link[href*="styles.css"]');
                if (cssLink) {
                    cssLink.href = assetUrl('css/styles.css', buildId);
                }
            }

            function startApp(buildId) {
                window.__APP_BUILD__ = buildId;
                document.documentElement.setAttribute('data-app-build', buildId);
                updateVersionedAssets(buildId);
                writeStoredBuild(buildId);

                function injectBootstrap() {
                    var bootstrap = document.createElement('script');
                    bootstrap.type = 'module';
                    bootstrap.src = assetUrl('js/bootstrap.js', buildId);
                    document.body.appendChild(bootstrap);
                }

                if (document.body) {
                    injectBootstrap();
                } else {
                    document.addEventListener('DOMContentLoaded', injectBootstrap, { once: true });
                }
            }

            function resolveBuildId(payload) {
                if (payload && typeof payload.version === 'string' && payload.version.trim() !== '') {
                    return payload.version.trim();
                }
                return FALLBACK_BUILD;
            }

            function needsReload(serverBuild, urlBuild, storedBuild) {
                if (serverBuild !== urlBuild) {
                    return true;
                }
                return Boolean(storedBuild && storedBuild !== serverBuild);
            }

            fetch(versionJsonUrl, { cache: 'no-store' })
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error('version.json unavailable');
                    }
                    return response.json();
                })
                .then(function (payload) {
                    var serverBuild = resolveBuildId(payload);
                    var urlBuild = urlBuildParam();
                    var storedBuild = readStoredBuild();

                    if (needsReload(serverBuild, urlBuild, storedBuild)) {
                        redirectToBuild(serverBuild);
                        return;
                    }

                    startApp(serverBuild);
                })
                .catch(function () {
                    var urlBuild = urlBuildParam();
                    var storedBuild = readStoredBuild();
                    var buildId = urlBuild || storedBuild || FALLBACK_BUILD;

                    if (needsReload(buildId, urlBuild, storedBuild)) {
                        redirectToBuild(buildId);
                        return;
                    }

                    startApp(buildId);
                });
        })();
    </script>
